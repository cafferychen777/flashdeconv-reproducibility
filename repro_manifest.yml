version: 1
outputs:
  spotless_benchmarks:
    commands:
      - bash scripts/download_spotless_data.sh ./data/spotless
      - Rscript scripts/convert_spotless_data.R ./data/spotless
      - python benchmarks/benchmark_silver_standards.py --data_dir ./data/spotless/converted --output_dir ./results
      - python benchmarks/benchmark_gold_standard.py --data_dir ./data/spotless/converted --output_dir ./results
      - python benchmarks/benchmark_liver.py --data_dir ./data/spotless/converted --output_dir ./results
      - python benchmarks/benchmark_melanoma.py --data_dir ./data/spotless/converted --output_dir ./results
    artifacts:
      - results/silver_standard_results.csv
      - results/gold_standard_results.csv
      - results/liver_benchmark_results.csv
      - results/melanoma_benchmark_results.csv
  scalability:
    commands:
      - python benchmarks/benchmark_scalability.py --output_dir ./results
    artifacts:
      - results/scalability_results.csv
      - results/scalability_figure.png
  visium_hd_tuft:
    commands:
      - bash scripts/download_visium_hd_data.sh ./data
      - python analysis/resolution_horizon_analysis.py --data_dir ./data --output_dir ./results --bins 16,32,64,128
      - python analysis/tuft_stem_discovery.py --data_dir ./data --output_dir ./results
      - python figures/main/figure7_tuft_discovery.py --results_dir ./results --output_dir ./figures
    artifacts:
      - results/resolution_metrics.csv
      - results/multiscale_proportions.csv
      - results/cell_type_visibility.csv
      - results/tuft_colocalization.csv
      - results/tuft_validation_results.csv
      - figures/figure7_tuft_discovery.png
      - figures/figure7_tuft_discovery.pdf
  cortex_lamination:
    commands:
      - bash scripts/download_cell2location_data.sh ./data/mouse_brain
      - python analysis/cortex_deconvolution.py --data_dir ./data --output_dir ./results
      - python figures/main/figure5_cortex_lamination.py --results_dir ./results --output_dir ./figures
    artifacts:
      - results/level2_v3_data.npz
      - results/level2_v3_proportions.csv
      - results/level2_v3_correlations.csv
      - figures/figure5_cortex_lamination.png
      - figures/figure5_cortex_lamination.pdf
  leverage_mechanism:
    commands:
      - bash scripts/download_cell2location_data.sh ./data/mouse_brain
      - python analysis/leverage_deep_dive.py --data_dir ./data --output_dir ./results
      - python figures/main/figure2_leverage_mechanism.py --results_dir ./results --output_dir ./figures
    artifacts:
      - results/leverage_deep_dive/experiment1_abundance_invariance.csv
      - results/leverage_deep_dive/experiment2_gene_quadrant_all.csv
      - results/leverage_deep_dive/experiment2_gold_genes_symbols.csv
      - results/leverage_deep_dive/experiment2_noise_genes_symbols.csv
      - figures/figure2_leverage_mechanism.png
      - figures/figure2_leverage_mechanism.pdf
